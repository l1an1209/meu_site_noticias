{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ site_name }} — {{ site_slogan }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/experiencia.css' %}">
</head>
<body class="experiencia-page">
    <div class="exp-bg" aria-hidden="true"></div>
    <div class="exp-particles" id="particles" aria-hidden="true"></div>

    <main class="exp-container" id="expMain">
        <div class="exp-logo-wrap" id="logoWrap">
            <div class="exp-logo-glow"></div>
            <img src="{% static site_logo %}" alt="{{ site_name }}" class="exp-logo" id="expLogo">
        </div>

        <h1 class="exp-title">{{ site_name }}</h1>
        <p class="exp-sub">{{ site_region }} · {{ site_slogan }}</p>

        <div class="exp-cards" id="infoCards">
            <div class="exp-card exp-card--time">
                <i class="far fa-clock"></i>
                <div>
                    <span class="exp-label">Hora local</span>
                    <strong id="horaLocal">--:--</strong>
                </div>
            </div>
            <div class="exp-card exp-card--loc">
                <i class="fas fa-map-marker-alt"></i>
                <div>
                    <span class="exp-label">Localização</span>
                    <strong id="localText">{{ cidade_nome }}, RO</strong>
                    <small id="coordsText" class="d-block text-white-50"></small>
                </div>
            </div>
            <div class="exp-card exp-card--weather">
                <i class="fas fa-cloud-sun" id="climaIcon"></i>
                <div>
                    <span class="exp-label">Clima agora</span>
                    <strong id="climaText">Carregando...</strong>
                    <small id="climaDetalhe" class="d-block text-white-50"></small>
                </div>
            </div>
        </div>

        <div class="exp-actions">
            <a href="{% url 'index' %}" class="btn btn-exp-primary btn-lg rounded-pill px-5">
                <i class="fas fa-newspaper me-2"></i>Entrar no portal
            </a>
            <button type="button" class="btn btn-outline-light rounded-pill" id="btnGeo">
                <i class="fas fa-crosshairs me-1"></i> Usar minha localização
            </button>
        </div>
        <p class="exp-hint small text-white-50 mt-4">Toque no logo no menu para voltar a esta experiência</p>
    </main>

    <script>
        window.JIPA_CONFIG = {
            cidade: "{{ cidade_nome|escapejs }}",
            latPadrao: {{ cidade_lat }},
            lonPadrao: {{ cidade_lon }},
            climaUrl: "{% url 'api_clima' %}",
            indexUrl: "{% url 'index' %}",
        };
    </script>
    <script src="{% static 'js/experiencia.js' %}"></script>
</body>
</html>
